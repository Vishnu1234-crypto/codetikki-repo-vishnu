server:
  port: 8080

spring:
  application:
    name: pseudocode-battle-service

  profiles:
    active: dev

  config:
    import: optional:configserver:http://localhost:8888

  cloud:
    config:
      uri: http://localhost:8888
      fail-fast: true

  datasource:
    url: jdbc:p6spy:mysql://localhost:3306/pseudocode_db
    username: root
    password: root
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

debug: false

logging:
  file:
    name: logs/application.log

  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{requestId}] [%X{method}] [%X{path}] %logger - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{requestId}] [%X{method}] [%X{path}] %logger - %msg%n"

  level:
    root: INFO
    com.codetikki: DEBUG
    p6spy: INFO
    org.hibernate: ERROR
    org.hibernate.SQL: ERROR
    org.hibernate.type: ERROR
    org.hibernate.orm.jdbc.bind: ERROR
    org.hibernate.type.descriptor.sql: ERROR

jwt:
  secret: my-super-secret-key-which-is-long-and-secure-at-least-32-bytes
  expiration: 3600000
