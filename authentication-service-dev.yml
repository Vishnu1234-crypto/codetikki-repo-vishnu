server:
  port: 8091   

spring:
  application:
    name: authentication-service   

  datasource:
    url: jdbc:mysql://localhost:3306/pseudocode_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: INFO
    com.codetikki: DEBUG

security:
  internal-key: my-secret-key
  jwt-secret: my-super-secret-key-which-is-long-and-secure-at-least-32-bytes
  jwt-expiration: 3600000
