server:
  port: 8084

spring:
  datasource:
    url: jdbc:p6spy:mysql://localhost:3306/pseudocode_db
    username: root
    password: root
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
