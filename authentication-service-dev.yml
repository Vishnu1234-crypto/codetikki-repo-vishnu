server:
  port: 8084

spring:
  application:
    name: pseudocode-battle-service

  profiles:
    active: dev

  config:
    import: optional:configserver:http://localhost:8888

  cloud:
    config:
      uri: http://localhost:8888
      fail-fast: true

  datasource:
    url: jdbc:p6spy:mysql://localhost:3306/pseudocode_db
    username: root
    password: root
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  file:
    name: logs/application.log

  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7

  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{requestId}] %logger - %msg%n"

  level:
    root: INFO
    com.codetikki: DEBUG

   
    p6spy: INFO

    # FULL Hibernate shutdown
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
    org.hibernate.type: OFF
    org.hibernate.type.descriptor.sql: OFF
    org.hibernate.stat: OFF

 
    p6spy: INFO

   
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
    org.hibernate.type: OFF
    org.hibernate.type.descriptor.sql: OFF
    org.hibernate.stat: OFF
