server:
  port: 8084

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pseudocode_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false   
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.type.descriptor.sql: TRACE
 security:
  internal-key: my-secret-key
  jwt-secret: my-very-secure-secret-key-123456
