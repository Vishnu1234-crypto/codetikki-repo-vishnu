server:
  port: 8090

spring:
  cloud:
    gateway:
      routes:
        - id: auth-route
          uri: http://localhost:8091
          predicates:
            - Path=/auth/**
          filters:
            - AddRequestHeader=X-Internal-Key, ${security.internal-key}

        - id: orchestra-route
          uri: http://localhost:8084
          predicates:
            - Path=/api/**
          filters:
            - AddRequestHeader=X-Internal-Key, ${security.internal-key}

      default-filters:
        - PreserveHostHeader

security:
  internal-key: my-secret-key

 
  jwt-secret: my-super-secret-key-which-is-long-and-secure-at-least-32-bytes

 
  jwt-expiration: 86400000   # 1 day (in ms)
  jwt-header: Authorization
  jwt-prefix: Bearer
